<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룰렛 돌리기!</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
            user-select: none; /* 드래그 방지 */
        }
        
        h1 { color: #333; margin-bottom: 20px; }
        
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
        }
        /* 룰렛 바늘 */
        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ff4757;
            z-index: 10;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.2, 0.8, 0.3, 1);
        }
        
        /* 버튼과 비밀 영역을 묶어주는 기준 박스 */
        .btn-container {
            position: relative;
            margin-top: 30px;
            display: inline-block;
        }
        
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #2ed573;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.98); }
        
        /* 💥 비밀 조작 버튼: 이제 완벽하게 투명합니다. */
        .secret-trigger {
            position: absolute;
            width: 80px;         
            height: 48px;        
            top: 0;
            right: -85px;        /* [돌리기!] 버튼 바로 오른쪽 빈 공간 */
            z-index: 999;
            background: transparent; /* 🔒 투명하게 변경 */
            border: none;             /* 🔒 테두리 삭제 */
            cursor: default;          /* 마우스가 올라가도 커서 모양이 변하지 않음 */
        }
    </style>
</head>
<body>

    <h1>다음 Compliance Committee 발표자</h1>
    
    <div class="wheel-container">
        <div class="arrow"></div>
        <canvas id="wheel" width="350" height="350"></canvas>
    </div>

    <div class="btn-container">
        <button onclick="spinWheel()">돌리기!</button>
        <div class="secret-trigger" onclick="setRigged()"></div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        
        // 대상: 임채홍 (0번째 고정)
        const items = ["임채홍", "이채성", "이학기", "이상훈", "전신우", "안재범", "정태진", "김응태"];
        const colors = ["#ff6b6b", "#feca57", "#ffffb2", "#1dd1a1", "#f5f6fa", "#54a0ff", "#ff7f50", "#7bed9f"];
        
        const numSegments = items.length;
        const segmentAngle = 360 / numSegments; 
        let currentRotation = 0;
        let isRigged = false; 

        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSegments; i++) {
                const startAngle = (i * segmentAngle * Math.PI) / 180;
                const endAngle = ((i + 1) * segmentAngle * Math.PI) / 180;
                
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.stroke();
                
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + (segmentAngle * Math.PI) / 360);
                ctx.textAlign = "right";
                ctx.fillStyle = "#333";
                ctx.font = "bold 15px Malgun Gothic";
                ctx.fillText(items[i], radius - 20, 10);
                ctx.restore();
            }
        }

        // 조작 모드 활성화 (콘솔 로그 기록만 남음)
        function setRigged() {
            isRigged = true;
            console.log("🔒 조작 모드 활성화: 다음 결과는 무조건 [임채홍]");
        }

        function spinWheel() {
            let targetAngle = 0;

            if (isRigged) {
                const targetSegment = 0; 
                const centerAngle = 270 - (targetSegment * segmentAngle) - (segmentAngle / 2);
                
                // ±14도 사이 자연스러운 랜덤 오프셋
                const randomOffset = (Math.random() - 0.5) * 28; 
                const desiredAngle = centerAngle + randomOffset;
                
                targetAngle = currentRotation + 1800 + (desiredAngle - (currentRotation % 360));
                isRigged = false; 
                console.log(`🎯 [조작 실행] 임채홍 내부 각도 ${desiredAngle.toFixed(1)}도 지점에 안착 예정`);
            } else {
                targetAngle = currentRotation + 1800 + Math.random() * 360;
            }

            currentRotation = targetAngle;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                const actualAngle = (360 - (currentRotation % 360) + 270) % 360;
                const winningIndex = Math.floor(actualAngle / segmentAngle) % numSegments;
                alert(`다음 발표자는 🎉 [${items[winningIndex]}] 님입니다! 🎉`);
            }, 4000);
        }

        drawWheel();
    </script>
</body>
</html>
